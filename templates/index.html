<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vietnamese eGov RAG Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <i data-lucide="landmark"></i>
      </div>
      <div>
        <h1>Vietnamese eGov RAG Assistant</h1>
        <p>Tra cứu thủ tục hành chính Việt Nam</p>
      </div>
    </div>
    <div class="header-actions">
      <span id="health-badge" class="status-badge">Đang kiểm tra</span>
      <button id="clear-chat" class="icon-button" type="button" title="New chat" aria-label="New chat">
        <i data-lucide="rotate-ccw"></i>
      </button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="side-panel">
      <section class="search-section">
        <div class="section-heading">
          <h2>Tra cứu</h2>
          <span id="search-count"></span>
        </div>
        <form id="search-form" class="search-form">
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="search-input" name="q" type="search" autocomplete="off" placeholder="Nhập tên thủ tục, hồ sơ, cơ quan...">
          <button type="submit" title="Search" aria-label="Search">
            <i data-lucide="arrow-right"></i>
          </button>
        </form>
        <div id="search-results" class="result-list" aria-live="polite"></div>
      </section>

      <section class="stats-section">
        <div class="section-heading">
          <h2>Thống kê</h2>
          <button id="refresh-stats" class="text-button" type="button">Làm mới</button>
        </div>
        <div class="metric-grid">
          <div class="metric">
            <span id="likes-count">0</span>
            <label>Like</label>
          </div>
          <div class="metric">
            <span id="dislikes-count">0</span>
            <label>Dislike</label>
          </div>
        </div>
        <ol id="popular-list" class="popular-list"></ol>
      </section>
    </aside>

    <section class="chat-panel">
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="chat-form" class="composer">
        <textarea id="chat-input" rows="1" placeholder="Hỏi về hồ sơ, trình tự, cơ quan thực hiện, lệ phí..."></textarea>
        <button id="send-button" type="submit" title="Send" aria-label="Send">
          <i data-lucide="send-horizontal"></i>
        </button>
      </form>
      <p class="disclaimer">
        Thông tin được tổng hợp từ dữ liệu thủ tục hành chính đã thu thập. Kết quả chỉ hỗ trợ tra cứu, người dùng nên kiểm tra lại nguồn chính thức trước khi nộp hồ sơ.
      </p>
    </section>
  </main>

  <template id="source-template">
    <a class="source-card" target="_blank" rel="noopener noreferrer">
      <span class="source-title"></span>
      <span class="source-meta"></span>
    </a>
  </template>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="{{ url_for('static', filename='javascript/script.js') }}"></script>
</body>
</html>
