[tool.ruff]
line-length = 120
target-version = "py311"
src = ["src", "tests", "scripts", "evaluation"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.black]
line-length = 120
target-version = ["py311"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
